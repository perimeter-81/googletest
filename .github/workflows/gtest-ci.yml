name: ci

on:
  push:
  pull_request:

env:
  BAZEL_CXXOPTS: -std=c++14

jobs:
  Linux:
    runs-on: ${{ vars.ACTIONS_RUNNER }}
    steps:
      - name: Push metrics
        if: always()
        continue-on-error: true
        uses: perimeter-81/actions/actions/monitoring/push_metrics@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Tests
        run: bazel test --cxxopt=-std=c++14 --features=external_include_paths --test_output=errors ...

  macOS:
    runs-on: macos-latest
    steps:
      - name: Push metrics
        if: always()
        continue-on-error: true
        uses: perimeter-81/actions/actions/monitoring/push_metrics@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Tests
        run: bazel test --cxxopt=-std=c++14 --features=external_include_paths --test_output=errors ...

  Windows:
    runs-on: windows-latest
    steps:
      - name: Push metrics
        if: always()
        continue-on-error: true
        uses: perimeter-81/actions/actions/monitoring/push_metrics@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          fetch-depth: 0

      - name: Tests
        run: bazel test --cxxopt=/std:c++14 --features=external_include_paths --test_output=errors ...
